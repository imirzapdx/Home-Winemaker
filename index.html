<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Winemaking Planner</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --burg:#722F37;--red:#8B0000;--rose:#D4798A;--rose-lt:#F9E4E8;--rose-dk:#8b3a4a;
  --gold:#C9A84C;--gold-lt:#FEF8E7;--parch:#F5ECD7;--border:#D4C5A9;
  --text:#2C1810;--muted:#7A6358;--bg:#FAF7F0;--oak:#5D8A5E;--inert:#2C7BB6;
  --sv:#7B6A5A;--shadow:0 2px 8px rgba(44,24,16,.12);--r:7px;
  --mj:#722F37;--mj-lt:#f9e8ea;
}
body{font-family:Georgia,'Palatino Linotype',serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.hdr{background:var(--burg);color:#fff;padding:10px 18px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 10px rgba(0,0,0,.35);position:sticky;top:0;z-index:100}
.hdr-title{font-size:18px;font-weight:bold;letter-spacing:.3px;white-space:nowrap}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 14px;border-radius:var(--r);cursor:pointer;font:inherit;font-size:13px;transition:.2s}
.tab:hover{background:rgba(255,255,255,.25)}.tab.active{background:#fff;color:var(--burg);font-weight:bold}
#content{padding:14px;max-width:1400px;margin:0 auto}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.panel{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--parch)}
.pt{font-size:15px;font-weight:bold;color:var(--burg)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--parch);padding:5px 9px;text-align:left;font-weight:bold;color:var(--muted);border-bottom:1px solid var(--border)}
.tbl td{padding:5px 9px;border-bottom:1px solid rgba(200,184,154,.3);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}.tbl tr:hover td{background:var(--parch)}
.btn{padding:5px 13px;border-radius:var(--r);border:none;cursor:pointer;font:inherit;font-size:13px;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn-p{background:var(--burg);color:#fff}.btn-p:hover{background:var(--red)}
.btn-s{background:var(--parch);color:var(--text);border:1px solid var(--border)}.btn-s:hover{background:var(--border)}
.btn-d{background:#c0392b;color:#fff}.btn-d:hover{background:#a93226}
.btn-sm{padding:3px 9px;font-size:12px}.btn-xs{padding:1px 5px;font-size:11px}
.fg{margin-bottom:10px}
.lbl{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:bold;text-transform:uppercase;letter-spacing:.4px}
.fc{width:100%;padding:5px 9px;border:1px solid var(--border);border-radius:var(--r);font:inherit;font-size:13px;background:#fff;color:var(--text)}
.fc:focus{outline:none;border-color:var(--burg);box-shadow:0 0 0 2px rgba(114,47,55,.15)}
.fc-ro{background:var(--parch)!important;cursor:default}
.ifrm{background:var(--parch);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px}
.ifrm-t{font-size:13px;font-weight:bold;color:var(--burg);margin-bottom:8px}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:bold}
.badge-red{background:#f0dede;color:var(--red)}.badge-white{background:var(--gold-lt);color:#7a5c00}
.badge-rose{background:var(--rose-lt);color:var(--rose-dk)}
.badge-mj{background:var(--mj);color:#fff;font-size:10px;padding:1px 5px;border-radius:3px}
.wines-layout{display:grid;grid-template-columns:230px 1fr;gap:14px;min-height:520px}
.wine-sidebar{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:10px;box-shadow:var(--shadow)}
.wine-item{padding:7px 9px;border-radius:var(--r);cursor:pointer;margin-bottom:3px;display:flex;align-items:center;gap:7px;font-size:13px;border:1px solid transparent;transition:.15s}
.wine-item:hover{background:var(--parch)}.wine-item.active{background:var(--parch);border-color:var(--burg)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-red{background:var(--red)}.dot-white{background:var(--gold);border:1px solid #ccc}.dot-rose{background:var(--rose)}
.calc-box{background:linear-gradient(135deg,var(--parch),#fff);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-top:12px}
.calc-title{font-size:13px;font-weight:bold;color:var(--burg);margin-bottom:8px}
.calc-row{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;border-bottom:1px dashed rgba(200,184,154,.4);font-size:13px}
.calc-row:last-child{border-bottom:none}
.cv{font-weight:bold;color:var(--burg);font-size:14px}
.warn{color:#c0392b;font-size:12px;margin-left:4px}
.ok{color:#1e8449;font-size:12px;margin-left:4px}
.sdiv{display:flex;align-items:center;gap:8px;margin:14px 0 8px;color:var(--muted);font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:.5px}
.sdiv::before,.sdiv::after{content:'';flex:1;border-top:1px solid var(--border)}
.tog{appearance:none;width:34px;height:18px;background:#ccc;border-radius:9px;cursor:pointer;position:relative;transition:.2s;flex-shrink:0}
.tog:checked{background:var(--burg)}.tog::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog:checked::after{left:18px}.tog-wrap{display:flex;align-items:center;gap:7px;cursor:pointer}
.fc-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px;padding:8px 12px;background:var(--parch);border-radius:var(--r);border:1px solid var(--border)}
.fc-leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
.fc-leg-swatch{width:14px;height:14px;border-radius:3px}
.comp-card{background:var(--parch);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-bottom:10px}
.comp-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.comp-card-title{font-size:12px;font-weight:bold;color:var(--burg);text-transform:uppercase;letter-spacing:.4px}
.rose-section{background:var(--rose-lt);border:1px solid #e8b4c0;border-radius:var(--r);padding:8px 10px;margin-top:8px}
.info-note{background:#eaf4fb;border:1px solid #aed6f1;border-radius:var(--r);padding:8px 10px;font-size:12px;color:#1a5276;margin-top:6px}
.warn-note{background:#fdedec;border:1px solid #f5b7b1;border-radius:var(--r);padding:8px 10px;font-size:12px;color:#922b21;margin-top:6px}
.ratio-total{font-size:12px;padding:3px 8px;border-radius:var(--r);font-weight:bold}
.rt-ok{background:#d5f5e3;color:#1e8449}.rt-bad{background:#fadbd8;color:#c0392b}
.comp-calc{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;margin-top:8px}
.comp-calc-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px dashed rgba(200,184,154,.3)}
.comp-calc-row:last-child{border-bottom:none}
.comp-cv{font-weight:bold;color:var(--burg)}
.split-box{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.split-item{background:#fff;border:2px solid;border-radius:var(--r);padding:6px 8px;font-size:11px}
.split-item.blend-item{border-color:#2C7BB6}.split-item.sv-item{border-color:var(--sv)}
.split-item-label{font-weight:bold;margin-bottom:3px}
.split-item.blend-item .split-item-label{color:#2C7BB6}
.split-item.sv-item .split-item-label{color:var(--sv)}
.empty{text-align:center;padding:32px;color:var(--muted)}.empty-icon{font-size:40px;margin-bottom:8px}
.flex{display:flex}.fai{align-items:center}.fjb{justify-content:space-between}
.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap12{gap:12px}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.txt-s{font-size:12px}.txt-m{color:var(--muted)}.txt-b{font-weight:bold}
.yeast-box{background:#f0f8f0;border:1px solid #a8d5a2;border-radius:var(--r);padding:8px 10px;margin-top:6px;font-size:12px}
.yeast-box-mj{background:var(--mj-lt);border-color:#e0a0a8}
.yeast-box-custom{background:#f5f0fb;border-color:#c9b0e8}
.yeast-box-title{font-weight:bold;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.yeast-meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px;font-size:11px;color:var(--muted)}
.tank-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;margin-bottom:6px}
.tank-card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.tank-pct-total{font-size:11px;padding:2px 6px;border-radius:3px;font-weight:bold}
.tpt-ok{background:#d5f5e3;color:#1e8449}.tpt-bad{background:#fadbd8;color:#c0392b}
.harvest-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.period-month{display:flex;gap:6px}
.period-month select{flex:1}
/* Equipment use-category chips */
.uses-row{display:flex;gap:4px;flex-wrap:wrap}
.use-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:12px;font-size:11px;font-weight:bold;cursor:pointer;border:1px solid var(--border);background:var(--parch);color:var(--muted);user-select:none;transition:.15s}
.use-chip input[type=checkbox]{width:12px;height:12px;cursor:pointer;margin:0;accent-color:var(--burg)}
.use-chip.chip-on{background:#d5f5e3;border-color:#7dbb8e;color:#1e6e34}

/* Profile bar */
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:3px 10px;border-radius:5px;font:inherit;font-size:12px;cursor:pointer;transition:.15s;white-space:nowrap}
.hdr-btn:hover{background:rgba(255,255,255,.28)}
.hdr-btn.hdr-btn-danger{background:rgba(220,60,60,.3);border-color:rgba(220,60,60,.5)}
.hdr-btn.hdr-btn-danger:hover{background:rgba(220,60,60,.5)}
.profile-select{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:3px 8px;border-radius:5px;font:inherit;font-size:13px;cursor:pointer;max-width:160px}
.profile-select option{background:#722F37;color:#fff}
</style>
</head>
<body>
<div id="app">
  <header class="hdr">
    <div class="hdr-title">🍷 Home Winemaking Planner</div>
    <div id="profile-bar" style="display:flex;align-items:center;gap:6px;margin-left:12px;margin-right:auto"></div>
    <nav class="tabs">
      <button class="tab active" onclick="switchTab('setup')">⚙ Setup</button>
      <button class="tab" onclick="switchTab('wines')">🍾 Wine Projects</button>
      <button class="tab" onclick="switchTab('flowchart')">📊 Flowchart</button>
    </nav>
  </header>
  <div id="content"></div>
</div>
<script>

// ════════════════════════════════════════════
// STORAGE & PROFILES
// ════════════════════════════════════════════
const STORAGE_KEY = 'wmp_v1';

function loadStorage(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'null')||{activeProfileId:null,profiles:[]}; }
  catch(e){ return {activeProfileId:null,profiles:[]}; }
}
function saveStorage(data){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(data)); }catch(e){} }

function stateToProfile(name, id){
  return {id:id||uid(), name, lastModified:new Date().toISOString(),
    equipment:JSON.parse(JSON.stringify(S.equipment)),
    customYeasts:JSON.parse(JSON.stringify(S.customYeasts||[])),
    grapes:JSON.parse(JSON.stringify(S.grapes)),
    wines:JSON.parse(JSON.stringify(S.wines)),
    svEquipment:JSON.parse(JSON.stringify(S.svEquipment||{}))};
}
function loadProfileIntoState(p){
  if(p.equipment)   S.equipment   = p.equipment;
  if(p.customYeasts)S.customYeasts= p.customYeasts;
  if(p.grapes)      S.grapes      = p.grapes;
  if(p.wines)       S.wines       = p.wines;
  if(p.svEquipment) S.svEquipment = p.svEquipment;
  // reset ui pointers that might point to stale ids
  S.ui.wineId = S.wines[0]?.id||null;
  S.ui.editingEqId=null; S.ui.editingGrapeId=null; S.ui.editingYeastId=null;
  S.ui.showEqForm=false; S.ui.showGrapeForm=false; S.ui.showCustomYeastForm=false;
}
function saveToStorage(){
  const data = loadStorage();
  if(!data.activeProfileId && data.profiles.length===0) return; // not yet initialised
  const idx = data.profiles.findIndex(p=>p.id===data.activeProfileId);
  const profile = stateToProfile(idx>=0?data.profiles[idx].name:'My Cellar', data.activeProfileId||uid());
  if(!data.activeProfileId) data.activeProfileId = profile.id;
  if(idx>=0) data.profiles[idx]=profile; else data.profiles.push(profile);
  saveStorage(data);
}
function initStorage(){
  let data = loadStorage();
  if(!data.profiles||data.profiles.length===0){
    // First run — save current default state as "My Cellar"
    const p = stateToProfile('My Cellar');
    data = {activeProfileId:p.id, profiles:[p]};
    saveStorage(data);
  } else {
    const active = data.profiles.find(p=>p.id===data.activeProfileId)||data.profiles[0];
    data.activeProfileId = active.id;
    saveStorage(data);
    loadProfileIntoState(active);
  }
  renderProfileBar();
  render();
}
function renderProfileBar(){
  const data = loadStorage();
  const profiles = data.profiles||[];
  const opts = profiles.map(p=>`<option value="${p.id}" ${p.id===data.activeProfileId?'selected':''}>${p.name}</option>`).join('');
  const bar = document.getElementById('profile-bar');
  if(!bar) return;
  bar.innerHTML = `
    <span style="color:rgba(255,255,255,.7);font-size:12px;flex-shrink:0">👤</span>
    <select class="profile-select" onchange="switchProfile(this.value)" title="Switch profile">${opts}</select>
    <button class="hdr-btn" onclick="promptNewProfile()" title="Create a new profile">+ New</button>
    <button class="hdr-btn" onclick="promptRenameProfile()" title="Rename current profile">✏</button>
    <button class="hdr-btn" onclick="exportProfile()" title="Export this profile as JSON file">⬇ Export</button>
    <label class="hdr-btn" title="Import a JSON file as a new profile" style="cursor:pointer;display:inline-flex;align-items:center">
      ⬆ Import<input type="file" accept=".json" style="display:none" onchange="importProfile(this)">
    </label>
    <button class="hdr-btn hdr-btn-danger" onclick="deleteProfile('${data.activeProfileId}')" title="Delete this profile">🗑</button>`;
}
function switchProfile(id){
  const data = loadStorage();
  const p = data.profiles.find(p=>p.id===id); if(!p) return;
  data.activeProfileId = id;
  saveStorage(data);
  loadProfileIntoState(p);
  renderProfileBar();
  render();
}
function promptNewProfile(){
  const name = prompt('New profile name:', 'New Winemaker');
  if(!name||!name.trim()) return;
  const data = loadStorage();
  // Start new profile with empty/default state
  const p = {id:uid(), name:name.trim(), lastModified:new Date().toISOString(),
    equipment:JSON.parse(JSON.stringify(S.equipment)),
    customYeasts:[], grapes:[], wines:[]};
  data.profiles.push(p);
  data.activeProfileId = p.id;
  saveStorage(data);
  loadProfileIntoState(p);
  renderProfileBar();
  render();
}
function promptRenameProfile(){
  const data = loadStorage();
  const p = data.profiles.find(p=>p.id===data.activeProfileId); if(!p) return;
  const name = prompt('Rename profile:', p.name);
  if(!name||!name.trim()) return;
  p.name = name.trim(); p.lastModified = new Date().toISOString();
  saveStorage(data);
  renderProfileBar();
}
function deleteProfile(id){
  const data = loadStorage();
  if(data.profiles.length<=1){ alert('Cannot delete the only profile.'); return; }
  const p = data.profiles.find(p=>p.id===id);
  if(!confirm(`Delete profile "${p?.name}"? This cannot be undone.`)) return;
  data.profiles = data.profiles.filter(p=>p.id!==id);
  data.activeProfileId = data.profiles[0].id;
  saveStorage(data);
  loadProfileIntoState(data.profiles[0]);
  renderProfileBar();
  render();
}
function exportProfile(){
  const data = loadStorage();
  const p = data.profiles.find(p=>p.id===data.activeProfileId)||data.profiles[0];
  const blob = new Blob([JSON.stringify(p, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'winemaker_'+(p.name.toLowerCase().replace(/[^a-z0-9]+/g,'_'))+'_'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
}
function importProfile(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const p = JSON.parse(e.target.result);
      if(!p.equipment&&!p.grapes&&!p.wines) throw new Error('Not a valid winemaker profile file.');
      const name = prompt('Name for imported profile:', p.name||file.name.replace('.json',''));
      if(!name) return;
      p.id = uid(); p.name = name.trim(); p.lastModified = new Date().toISOString();
      const data = loadStorage();
      data.profiles.push(p);
      data.activeProfileId = p.id;
      saveStorage(data);
      loadProfileIntoState(p);
      renderProfileBar();
      render();
      alert('Profile "'+p.name+'" imported successfully!');
    }catch(err){ alert('Import failed: '+err.message); }
  };
  reader.readAsText(file);
  input.value=''; // reset so same file can be re-imported
}

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let S = {
  equipment: [
    {id:'eq1',name:'6-gal Glass Carboy',    type:'carboy',material:'glass',   volumeGal:6,   qty:2,oakType:null,uses:['secondary','aging']},
    {id:'eq2',name:'5-gal Glass Carboy',    type:'carboy',material:'glass',   volumeGal:5,   qty:3,oakType:null,uses:['secondary','aging']},
    {id:'eq3',name:'23L Plastic Carboy',    type:'carboy',material:'plastic', volumeGal:6.1, qty:2,oakType:null,uses:['secondary','aging']},
    {id:'eq4',name:'30-gal Plastic Barrel', type:'barrel',material:'plastic', volumeGal:30,  qty:1,oakType:null,uses:['aging']},
    {id:'eq5',name:'59-gal French Oak Barrel',type:'barrel',material:'oak',   volumeGal:59.4,qty:1,oakType:'french',uses:['aging']},
    {id:'eq6',name:'20-gal HDPE Bucket',    type:'bucket',material:'plastic', volumeGal:20,  qty:4,oakType:null,uses:['primary','secondary']},
    {id:'eq7',name:'32-gal HDPE Bucket',    type:'bucket',material:'plastic', volumeGal:32,  qty:2,oakType:null,uses:['primary','secondary']},
  ],
  customYeasts: [],
  grapes: [
    {id:'g1',name:'Cabernet Sauvignon',type:'red',  pounds:500,lbsPerGal:13,
     origin:'Napa Valley',harvestStartPeriod:'Early',harvestStartMonth:'September',harvestEndPeriod:'Mid',harvestEndMonth:'October',targetBrix:25},
    {id:'g2',name:'Merlot',            type:'red',  pounds:175,lbsPerGal:13,
     origin:'Sonoma',harvestStartPeriod:'Early',harvestStartMonth:'September',harvestEndPeriod:'Early',harvestEndMonth:'October',targetBrix:24},
    {id:'g3',name:'Chardonnay',        type:'white',pounds:150,lbsPerGal:12,
     origin:'Russian River Valley',harvestStartPeriod:'Late',harvestStartMonth:'August',harvestEndPeriod:'Mid',harvestEndMonth:'September',targetBrix:23},
  ],
  wines: [
    {
      id:'w1',name:'Bordeaux Blend',color:'red',wineType:'blend',lbsPerGal:13,
      agingEquipmentId:'eq4',agingVolumeGal:30,useOak:false,oakType:null,
      components:[
        {grapeId:'g1',ratio:70,primaryEquipmentId:'eq7',secondaryEquipmentId:'eq7',
         hasRose:true,saigneePercent:10,roseAgingEquipmentId:'eq3',roseAgingVolumeGal:6.1,
         roseYeastId:'71b',singleAgingEquipmentId:'eq1',
         yeastId:'mj-vr21',useTankSplit:false,
         tanks:[{id:'tk1',name:'Tank A',percent:100,yeastId:'mj-vr21',blendPct:100}]},
        {grapeId:'g2',ratio:30,primaryEquipmentId:'eq6',secondaryEquipmentId:'eq6',
         hasRose:false,saigneePercent:10,roseAgingEquipmentId:null,roseAgingVolumeGal:0,
         roseYeastId:null,singleAgingEquipmentId:'eq2',
         yeastId:'mj-vr5',useTankSplit:false,
         tanks:[{id:'tk2',name:'Tank A',percent:100,yeastId:'mj-vr5',blendPct:100}]},
      ],
      grapeId:null,secondaryEquipmentId:null,primaryEquipmentId:null,
      hasRose:false,saigneePercent:0,roseAgingEquipmentId:null,roseAgingVolumeGal:0,
      roseYeastId:null,yeastId:null,useTankSplit:false,tanks:[],
    },
    {
      id:'w2',name:'Chardonnay Reserve',color:'white',wineType:'single',lbsPerGal:12,
      components:[],grapeId:'g3',
      agingEquipmentId:'eq3',agingVolumeGal:6.1,useOak:false,oakType:null,
      secondaryEquipmentId:'eq2',primaryEquipmentId:'eq6',
      hasRose:false,saigneePercent:0,roseAgingEquipmentId:null,roseAgingVolumeGal:0,
      roseYeastId:null,yeastId:'mj-m02',useTankSplit:false,
      tanks:[{id:'tk3',name:'Tank A',percent:100,yeastId:'mj-m02',blendPct:100}],
    },

// ════════════════════════════════════════════
// GRAPE ALLOCATION ENGINE
// ════════════════════════════════════════════
// Returns a Map<grapeId, {totalLbs, allocations:[{wineId,wineName,lbs}], remainingLbs}>
// Each wine's demand is calculated forward from its grape poundage settings.
// For single wines: grapes needed = backward calc from aging vessel.
// For blend wines: grapes used = totalMustGal * lbpg (forward from all grapes available).
// We assign demand in wine order (index), deducting from the pool as we go.
function calcGrapeAllocations(){
  const pool = new Map(); // grapeId -> {totalLbs, committed}
  S.grapes.forEach(g => pool.set(g.id, {totalLbs: g.pounds, committed: 0}));

  // First pass: compute each wine's grape demand per grapeId
  const wineDemands = []; // [{wineId, demands:[{grapeId, lbs}]}]
  S.wines.forEach(wine => {
    const demands = [];
    if(wine.wineType === 'single'){
      const agingGal = parseFloat(wine.agingVolumeGal)||0;
      if(agingGal && wine.grapeId){
        const grape = grapeById(wine.grapeId);
        const lbpg = grape?.lbsPerGal || parseFloat(wine.lbsPerGal)||13;
        // back-calc: how many grapes does this wine need?
        const secGal = agingGal/LOSS.sToA, primaryGal = secGal/LOSS.pToS;
        let totalMust = primaryGal;
        if(wine.hasRose && wine.saigneePercent>0 && wine.color==='red'){
          totalMust = primaryGal/(1 - wine.saigneePercent/100);
        }
        demands.push({grapeId: wine.grapeId, lbs: totalMust * lbpg});
      }
    } else {
      // blend: each component uses all its available grapes (forward calc)
      wine.components.forEach(comp => {
        if(!comp.grapeId) return;
        const grape = grapeById(comp.grapeId);
        const lbpg = grape?.lbsPerGal || parseFloat(wine.lbsPerGal)||13;
        const totalMust = (grape?.pounds||0)/lbpg;
        demands.push({grapeId: comp.grapeId, lbs: grape?.pounds||0});
      });
    }
    wineDemands.push({wineId: wine.id, wineName: wine.name, demands});
  });

  // Second pass: allocate in wine order, respect pool
  const allocMap = new Map(); // grapeId -> {totalLbs, allocations:[{wineId,wineName,lbs,allocated}]}
  S.grapes.forEach(g => allocMap.set(g.id, {totalLbs: g.pounds, allocations: []}));

  wineDemands.forEach(({wineId, wineName, demands}) => {
    demands.forEach(({grapeId, lbs}) => {
      const entry = allocMap.get(grapeId); if(!entry) return;
      const alreadyCommitted = entry.allocations.reduce((s,a)=>s+a.allocated, 0);
      const remaining = Math.max(0, entry.totalLbs - alreadyCommitted);
      const allocated = Math.min(lbs, remaining);
      entry.allocations.push({wineId, wineName, requested: lbs, allocated});
    });
  });

  // Add remainingLbs convenience field
  allocMap.forEach(entry => {
    const used = entry.allocations.reduce((s,a)=>s+a.allocated,0);
    entry.remainingLbs = Math.max(0, entry.totalLbs - used);
    entry.usedLbs = used;
  });

  return allocMap;
}

// Get lbs available to a specific wine for a specific grape,
// respecting prior wines' allocations (wines earlier in the list get priority).
function grapeAvailableToWine(grapeId, wineId){
  const allocMap = calcGrapeAllocations();
  const entry = allocMap.get(grapeId); if(!entry) return 0;
  const myAlloc = entry.allocations.find(a=>a.wineId===wineId);
  return myAlloc ? myAlloc.allocated : 0;
}

// ════════════════════════════════════════════
// CALCULATION ENGINE
// ════════════════════════════════════════════
function calcRoseChain(mustGal, roseAgingVolumeGal){
  const secGal = mustGal * LOSS.pToS;
  const ageGal = roseAgingVolumeGal ? parseFloat(roseAgingVolumeGal) : secGal * LOSS.sToA;
  const botGal = ageGal * LOSS.aToB;
  return {primaryGal:mustGal,secondaryGal:secGal,agingGal:ageGal,bottleGal:botGal,bottles:Math.floor(botGal*BPGAL)};
}
function calcSingleWine(wine){
  const agingGal = parseFloat(wine.agingVolumeGal)||0; if(!agingGal) return null;
  const grape = grapeById(wine.grapeId);
  const lbpg = grape?.lbsPerGal||parseFloat(wine.lbsPerGal)||13;
  const bottleGal = agingGal*LOSS.aToB, bottles=Math.floor(bottleGal*BPGAL);
  const secondaryGal = agingGal/LOSS.sToA, primaryGal=secondaryGal/LOSS.pToS;
  let totalMustGal=primaryGal,roseMustGal=0,roseCalc=null;
  if(wine.hasRose&&wine.saigneePercent>0&&wine.color==='red'){
    const sf=wine.saigneePercent/100; totalMustGal=primaryGal/(1-sf); roseMustGal=totalMustGal*sf;
    roseCalc=calcRoseChain(roseMustGal,wine.roseAgingVolumeGal);
  }
  const grapsNeeded=totalMustGal*lbpg;
  const totalLbs=grape?.pounds||0;
  const availLbs=wine.grapeId?grapeAvailableToWine(wine.grapeId,wine.id):0;
  const tankResults=wine.useTankSplit&&wine.tanks?.length>0
    ?wine.tanks.map(t=>({...t,mustGal:t.percent/100*totalMustGal,secGal:t.percent/100*totalMustGal*LOSS.pToS})):null;
  return {isSingle:true,totalMustGal,primaryGal,roseMustGal,secondaryGal,agingGal,bottleGal,bottles,
    grapsNeeded,availLbs,totalLbs,sufficient:availLbs>=grapsNeeded,tankResults,
    components:[{grapeId:wine.grapeId,name:grape?.name||'?',ratio:100,totalMustGal,primaryGal,roseMustGal,
      compSecGal:secondaryGal,blendPortionGal:0,excessGal:0,shortfall:0,availLbs,totalLbs,sufficient:availLbs>=grapsNeeded,roseCalc,singleCalc:null}]};
}
function calcBlendWine(wine){
  const agingGal=parseFloat(wine.agingVolumeGal)||0; if(!agingGal) return null;
  const blendSecNeeded=agingGal/LOSS.sToA, blendBotGal=agingGal*LOSS.aToB, blendBottles=Math.floor(blendBotGal*BPGAL);
  const totRatio=wine.components.reduce((s,c)=>s+(parseFloat(c.ratio)||0),0)||1;
  const allocMap=calcGrapeAllocations();
  const components=wine.components.map(comp=>{
    const ratio=(parseFloat(comp.ratio)||0)/totRatio;
    const grape=grapeById(comp.grapeId);
    const lbpg=grape?.lbsPerGal||parseFloat(wine.lbsPerGal)||13;
    const totalLbs=grape?.pounds||0;
    // Use only the lbs allocated to this wine for this grape
    const allocEntry=comp.grapeId?allocMap.get(comp.grapeId):null;
    const myAlloc=allocEntry?.allocations.find(a=>a.wineId===wine.id);
    const availLbs=myAlloc?myAlloc.allocated:0;
    const totalMustGal=availLbs/lbpg;
    let redMustGal=totalMustGal,roseMustGal=0,roseCalc=null;
    if(comp.hasRose&&comp.saigneePercent>0&&wine.color==='red'){
      const sf=comp.saigneePercent/100; roseMustGal=totalMustGal*sf; redMustGal=totalMustGal*(1-sf);
      roseCalc=calcRoseChain(roseMustGal,comp.roseAgingVolumeGal);
    }
    const compSecGal=redMustGal*LOSS.pToS, blendPortionGal=blendSecNeeded*ratio;
    let blendFromComp,svFromComp,tankResults=null;
    if(comp.useTankSplit&&comp.tanks?.length>0){
      blendFromComp=comp.tanks.reduce((s,t)=>s+(t.percent/100*redMustGal*LOSS.pToS*(t.blendPct/100)),0);
      svFromComp=comp.tanks.reduce((s,t)=>s+(t.percent/100*redMustGal*LOSS.pToS*(1-t.blendPct/100)),0);
      tankResults=comp.tanks.map(t=>({...t,mustGal:t.percent/100*totalMustGal,
        secGal:t.percent/100*redMustGal*LOSS.pToS,
        blendGal:t.percent/100*redMustGal*LOSS.pToS*(t.blendPct/100),
        svGal:t.percent/100*redMustGal*LOSS.pToS*(1-t.blendPct/100)}));
    } else { blendFromComp=Math.min(compSecGal,blendPortionGal); svFromComp=Math.max(0,compSecGal-blendPortionGal); }
    const excessGal=svFromComp, shortfall=Math.max(0,blendPortionGal-blendFromComp);
    let singleCalc=null;
    if(excessGal>0.05){
      const svEq=byId(comp.singleAgingEquipmentId);
      const svAgeGal=svEq?svEq.volumeGal:excessGal*LOSS.sToA, svBotGal=svAgeGal*LOSS.aToB;
      singleCalc={secondaryGal:excessGal,agingGal:svAgeGal,bottleGal:svBotGal,bottles:Math.floor(svBotGal*BPGAL)};
    }
    return {grapeId:comp.grapeId,name:grape?.name||'?',ratio:ratio*100,availLbs,totalLbs,totalMustGal,redMustGal,roseMustGal,
      compSecGal,blendPortionGal,blendFromComp,excessGal,svFromComp,shortfall,sufficient:shortfall===0,
      roseCalc,singleCalc,tankResults,useTankSplit:comp.useTankSplit};
  });
  return {isBlend:true,components,blendSecNeeded,agingGal,blendBotGal,blendBottles,
    secondaryGal:blendSecNeeded,bottleGal:blendBotGal,bottles:blendBottles,
    totalGrapesPounds:components.reduce((s,c)=>s+c.availLbs,0),
    totalMustGal:components.reduce((s,c)=>s+c.totalMustGal,0)};
}
function calcWine(w){ return w.wineType==='blend'?calcBlendWine(w):calcSingleWine(w); }

function calcSVConsolidation(){
  // Aggregate SV excess across all blend wines, grouped by grapeId::yeastId
  const pools=new Map();
  S.wines.forEach(wine=>{
    if(wine.wineType!=='blend') return;
    const calc=calcWine(wine);
    wine.components.forEach((comp,ci)=>{
      const cc=calc?.components[ci]; if(!cc||cc.excessGal<=0.05) return;
      if(comp.useTankSplit&&comp.tanks?.length>0){
        comp.tanks.forEach((t,ti)=>{
          const svGal=cc.tankResults?.[ti]?.svGal||0; if(svGal<=0.05) return;
          const key=comp.grapeId+'::'+(t.yeastId||'none');
          if(!pools.has(key)) pools.set(key,{grapeId:comp.grapeId,yeastId:t.yeastId||null,totalExcessGal:0,sources:[]});
          const p=pools.get(key); p.totalExcessGal+=svGal;
          p.sources.push({wineId:wine.id,wineName:wine.name,compIdx:ci,tankIdx:ti});
        });
      } else {
        const key=comp.grapeId+'::'+(comp.yeastId||'none');
        if(!pools.has(key)) pools.set(key,{grapeId:comp.grapeId,yeastId:comp.yeastId||null,totalExcessGal:0,sources:[]});
        const p=pools.get(key); p.totalExcessGal+=cc.excessGal;
        p.sources.push({wineId:wine.id,wineName:wine.name,compIdx:ci,tankIdx:null});
      }
    });
  });
  pools.forEach((p,key)=>{
    p.isShared=new Set(p.sources.map(s=>s.wineId)).size>1;
    const eqId=(S.svEquipment||{})[key],eq=byId(eqId);
    p.eqId=eqId||null;
    p.agingGal=eq?eq.volumeGal:+(p.totalExcessGal*LOSS.sToA).toFixed(2);
    p.bottles=Math.floor(p.agingGal*LOSS.aToB*BPGAL);
  });
  return pools;
}

function renderYeastAndTankSection(wid,ci,yeastId,useTankSplit,tanks,totalMustGal,wineColor,grapeId,isBlend){
  const grape=grapeById(grapeId), grapeName=grape?.name||'';
  const ciStr=ci!==null&&ci!==undefined?String(ci):'null';
  const tankPctTotal=tanks?tanks.reduce((s,t)=>s+(parseFloat(t.percent)||0),0):0;
  const tankPctOk=Math.abs(tankPctTotal-100)<1;
  const tankCards=(useTankSplit&&tanks&&tanks.length>0)?tanks.map((t,ti)=>{
    const tankSec=(t.percent/100*(totalMustGal||0)*LOSS.pToS);
    return `<div class="tank-card">
      <div class="tank-card-hdr">
        <input class="fc" style="width:90px;padding:3px 7px" value="${t.name}" placeholder="Tank A"
          onchange="updateTank('${wid}',${ciStr},${ti},'name',this.value)">
        <div class="flex fai gap4"><span class="lbl" style="margin:0">Grapes:</span>

            onchange="updateTank('${wid}',${ciStr},${ti},'percent',+this.value)">

function buildSVG(){
  if(!S.wines.length) return '<div class="empty"><div class="empty-icon">📊</div><p>Add wine projects to see flowchart</p></div>';
  const NW=155,NH=70,ROW_H=140,PAD_LEFT=108,PAD_TOP=130,PAD_RIGHT=20;
  const CW=170,RW=155,BW=185,LINE_GAP=26,GRAPE_GAP=48,PROJ_GAP=32,SV_COL_W=160;
  const N_ROWS=5;
  const rowY=r=>PAD_TOP+r*ROW_H;
  const nodeTop=r=>rowY(r)+(ROW_H-NH)/2;
  const nodeMid=r=>nodeTop(r)+NH/2;
  const nodeBot=r=>nodeTop(r)+NH;
  let els=[];

  // ════════════════════════════════════════════
  // PHASE 1 — Build fermentation lines (deduplicated by grapeId + yeastId)
  // across ALL wine projects (single & blend components). This is the
  // foundational layer: the same variety+yeast batch is ONE line no matter
  // how many downstream projects will eventually draw from it.
  // ════════════════════════════════════════════
  const fermLines = new Map(); // key -> {key,grapeId,yeastId,usages:[],roseUsages:[]}
  function getLine(grapeId,yeastId){
    const key=grapeId+'::'+(yeastId||'none');
    if(!fermLines.has(key)) fermLines.set(key,{key,grapeId,yeastId,usages:[],roseUsages:[]});
    return fermLines.get(key);
  }
  S.wines.forEach(wine=>{
    const calc=calcWine(wine);
    if(!calc) return;
    if(wine.wineType==='single'){
      const cc=calc.components[0]; if(!cc||!wine.grapeId) return;
      if(wine.useTankSplit&&wine.tanks?.length>1&&calc.tankResults){
        wine.tanks.forEach((t,ti)=>{
          const tr=calc.tankResults[ti]; if(!tr) return;
          const line=getLine(wine.grapeId,t.yeastId);
          line.usages.push({wineId:wine.id,compIdx:null,tankIdx:ti,mustGal:tr.mustGal,secGal:tr.secGal,
            dest:{kind:'wine',wineId:wine.id,portionGal:tr.secGal}});
        });
      } else {
        const yId=wine.yeastId||wine.tanks?.[0]?.yeastId;
        const line=getLine(wine.grapeId,yId);
        line.usages.push({wineId:wine.id,compIdx:null,tankIdx:null,mustGal:cc.totalMustGal,secGal:cc.compSecGal,
          dest:{kind:'wine',wineId:wine.id,portionGal:cc.compSecGal}});
        if(cc.roseCalc&&cc.roseMustGal>0.05) line.roseUsages.push({roseMustGal:cc.roseMustGal,roseAgingEquipmentId:wine.roseAgingEquipmentId});
      }
    } else {
      wine.components.forEach((comp,ci)=>{
        const cc=calc.components[ci]; if(!cc||!comp.grapeId) return;
        if(comp.useTankSplit&&comp.tanks?.length>1&&cc.tankResults){
          comp.tanks.forEach((t,ti)=>{
            const tr=cc.tankResults[ti]; if(!tr) return;
            const line=getLine(comp.grapeId,t.yeastId);
            line.usages.push({wineId:wine.id,compIdx:ci,tankIdx:ti,mustGal:tr.mustGal,secGal:tr.secGal,
              dest:{kind:'blend',wineId:wine.id,blendGal:tr.blendGal,svGal:tr.svGal,shortfall:0}});
          });
        } else {
          const yId=comp.yeastId||comp.tanks?.[0]?.yeastId;
          const line=getLine(comp.grapeId,yId);
          line.usages.push({wineId:wine.id,compIdx:ci,tankIdx:null,mustGal:cc.totalMustGal,secGal:cc.compSecGal,
            dest:{kind:'blend',wineId:wine.id,blendGal:cc.blendFromComp,svGal:cc.excessGal,shortfall:cc.shortfall}});
          if(cc.roseCalc&&cc.roseMustGal>0.05) line.roseUsages.push({roseMustGal:cc.roseMustGal,roseAgingEquipmentId:comp.roseAgingEquipmentId});
        }
      });
    }
  });

  fermLines.forEach(line=>{
    line.totalMustGal=line.usages.reduce((s,u)=>s+(u.mustGal||0),0);
    line.totalSecGal=line.usages.reduce((s,u)=>s+(u.secGal||0),0);
    const blendMap=new Map();
    line.usages.forEach(u=>{
      if(u.dest.kind==='blend'){
        const e=blendMap.get(u.dest.wineId)||{gal:0,shortfall:0};
        e.gal+=u.dest.blendGal||0; e.shortfall+=u.dest.shortfall||0;
        blendMap.set(u.dest.wineId,e);
      }
    });
    line.blendDests=[...blendMap.entries()].map(([wineId,v])=>({wineId,gal:v.gal,shortfall:v.shortfall}));
    line.wineDests=line.usages.filter(u=>u.dest.kind==='wine').map(u=>({wineId:u.dest.wineId,gal:u.dest.portionGal}));
    if(line.roseUsages.length){
      const totalRoseMust=line.roseUsages.reduce((s,r)=>s+(r.roseMustGal||0),0);
      const first=line.roseUsages[0];
      line.roseAgingEquipmentId=first.roseAgingEquipmentId;
      const rAgeEq=byId(first.roseAgingEquipmentId);
      line.roseCalc = totalRoseMust>0.05 ? calcRoseChain(totalRoseMust, rAgeEq?.volumeGal) : null;
    }
  });

  const allocMap = calcGrapeAllocations();
  const svPools = calcSVConsolidation(); // keyed identically to fermLines (grapeId::yeastId)

  // ════════════════════════════════════════════
  // PHASE 2 — Layout: lines grouped by grape (left), then wine projects,
  // then auto-consolidated SV pools (right). Lines are the source; projects
  // and SV pools are the destinations the allocation arrows fan into.
  // ════════════════════════════════════════════
  const grapeOrder=[]; const grapeLines=new Map();
  fermLines.forEach(line=>{
    if(!grapeLines.has(line.grapeId)){ grapeLines.set(line.grapeId,[]); grapeOrder.push(line.grapeId); }
    grapeLines.get(line.grapeId).push(line);
  });

  let curX=PAD_LEFT;
  const grapeNodeInfo=[]; // {grapeId,nodeCx,cols:[{line,cx,roseCx,hasRose}]}
  grapeOrder.forEach(grapeId=>{
    const linesForGrape=grapeLines.get(grapeId);
    const colInfos=[];
    linesForGrape.forEach(line=>{
      const hasRose=!!line.roseCalc;
      const cx=curX+CW/2;
      const roseCx=hasRose?curX+CW+RW/2:null;
      colInfos.push({line,cx,roseCx,hasRose});
      curX+=CW+(hasRose?RW:0)+LINE_GAP;
    });
    curX+=GRAPE_GAP-LINE_GAP;
    const xs=colInfos.map(c=>c.cx);
    const nodeCx=xs.reduce((a,b)=>a+b,0)/(xs.length||1);
    grapeNodeInfo.push({grapeId,nodeCx,cols:colInfos});
  });
  curX+=10;

  const projLayouts=[]; // {wine,calc,cx,w}
  S.wines.forEach(wine=>{
    const calc=calcWine(wine);
    const w=wine.wineType==='blend'?BW:CW;
    const cx=curX+w/2;
    projLayouts.push({wine,calc,cx,w});
    curX+=w+PROJ_GAP;
  });
  const projByWineId=new Map(projLayouts.map(p=>[p.wine.id,p]));

  const svLayouts=[]; // {key,pool,cx}
  svPools.forEach((pool,key)=>{
    if(pool.totalExcessGal<=0.05) return;
    const cx=curX+SV_COL_W/2;
    svLayouts.push({key,pool,cx});
    curX+=SV_COL_W+PROJ_GAP;
  });
  const svByKey=new Map(svLayouts.map(s=>[s.key,s]));

  const totalW=Math.max(curX-PROJ_GAP+PAD_RIGHT, PAD_LEFT+CW+PAD_RIGHT);
  const totalH=PAD_TOP+N_ROWS*ROW_H+55;

  els.push(`<defs>
    <filter id="ds"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.18)"/></filter>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#999"/></marker>
    <marker id="arr-r" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#D4798A"/></marker>
    <marker id="arr-b" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#2C7BB6"/></marker>
    <marker id="arr-sv" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#7B6A5A"/></marker>
  </defs>`);
  els.push(`<rect width="${totalW}" height="${totalH}" fill="#FAF7F0"/>`);
  els.push(`<rect x="0" y="${PAD_TOP}" width="${PAD_LEFT-5}" height="${N_ROWS*ROW_H}" fill="rgba(245,236,215,0.6)"/>`);
  ['🍇 Grapes','🪣 Primary','⚗️ Secondary','🛢 Aging','🍾 Bottles'].forEach((lbl,i)=>{
    els.push(`<line x1="${PAD_LEFT-2}" y1="${rowY(i)}" x2="${totalW-5}" y2="${rowY(i)}" stroke="#E8DEC8" stroke-width="1" stroke-dasharray="4,3"/>`);
    els.push(`<text x="${PAD_LEFT-7}" y="${nodeMid(i)+5}" text-anchor="end" font-size="11" fill="#7A6358" font-family="Georgia" font-style="italic">${lbl}</text>`);
  });
  // Section divider between fermentation lines and wine projects
  if(projLayouts.length){
    const divX=projLayouts[0].cx-projLayouts[0].w/2-PROJ_GAP/2;
    els.push(`<line x1="${divX}" y1="${PAD_TOP-90}" x2="${divX}" y2="${rowY(4)+NH+14}" stroke="#C9A88C" stroke-width="1.5" stroke-dasharray="2,4" opacity="0.5"/>`);
    els.push(`<text x="${divX+6}" y="${PAD_TOP-92}" font-size="10" fill="#A88E6A" font-family="Georgia" font-style="italic">Varietals ▶ Projects</text>`);
  }

  function node(cx,row,title,sub,color,textColor='#fff'){
    const x=cx-NW/2,y=nodeTop(row),t1=title.length>20?title.slice(0,19)+'…':title;
    const s1=sub?(sub.length>24?sub.slice(0,23)+'…':sub):'';
    els.push(`<rect x="${x}" y="${y}" width="${NW}" height="${NH}" rx="8" fill="${color}" filter="url(#ds)"/>`);
    els.push(`<text x="${cx}" y="${y+26}" text-anchor="middle" font-size="12" font-weight="bold" fill="${textColor}" font-family="Georgia">${t1}</text>`);
    if(s1) els.push(`<text x="${cx}" y="${y+44}" text-anchor="middle" font-size="11" fill="${textColor==='#fff'?'rgba(255,255,255,.85)':'#7A6358'}" font-family="Georgia">${s1}</text>`);
    if(sub&&sub.includes('~')) els.push(`<text x="${cx}" y="${y+60}" text-anchor="middle" font-size="10" fill="${textColor==='#fff'?'rgba(255,255,255,.7)':'#999'}" font-family="Georgia">${sub.split(' ').slice(1).join(' ')}</text>`);
  }
  function arrowV(x,y1,y2,color='#999',dashed=false){
    const mk=color==='#D4798A'?'arr-r':color==='#2C7BB6'?'arr-b':color==='#7B6A5A'?'arr-sv':'arr';
    els.push(`<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2-5}" stroke="${color}" stroke-width="2" ${dashed?'stroke-dasharray="5,3"':''} marker-end="url(#${mk})"/>`);
  }
  function arrowCurve(x1,y1,x2,y2,color='#999',dashed=false){
    const mk=color==='#D4798A'?'arr-r':color==='#2C7BB6'?'arr-b':color==='#7B6A5A'?'arr-sv':'arr';
    const my1=y1+(y2-y1)*0.35,my2=y2-(y2-y1)*0.35;
    els.push(`<path d="M${x1},${y1} C${x1},${my1} ${x2},${my2} ${x2},${y2-5}" stroke="${color}" stroke-width="2" fill="none" ${dashed?'stroke-dasharray="5,3"':''} marker-end="url(#${mk})" opacity="${dashed?'0.8':'1'}"/>`);
  }
  function hArrow(x1,y,x2,color,dashed=false){
    const mk=color==='#D4798A'?'arr-r':color==='#2C7BB6'?'arr-b':'arr';
    els.push(`<line x1="${x1}" y1="${y}" x2="${x2-5}" y2="${y}" stroke="${color}" stroke-width="2" ${dashed?'stroke-dasharray="5,3"':''} marker-end="url(#${mk})"/>`);
  }
  function drawRoseChain(roseCx,roseCalc,roseAgingEqId){
    const rAgeEq=byId(roseAgingEqId);
    node(roseCx,1,'🌹 Rosé Primary',fmtGal(roseCalc.primaryGal),'#D4798A');
    arrowV(roseCx,nodeBot(1),nodeTop(2),'#D4798A');
    node(roseCx,2,'🌹 Rosé Secondary',fmtGal(roseCalc.secondaryGal),'#C06080');
    arrowV(roseCx,nodeBot(2),nodeTop(3),'#D4798A');
    node(roseCx,3,rAgeEq?rAgeEq.name:'Rosé Aging',fmtGal(roseCalc.agingGal),'#A04060');
    arrowV(roseCx,nodeBot(3),nodeTop(4),'#D4798A');
    node(roseCx,4,'🌹 Rosé Bottles',`~${roseCalc.bottles} btl`,'#804050');
  }
  function eqNamesFor(line,field){
    return [...new Set(line.usages.map(u=>{
      const w=wineById(u.wineId); if(!w) return null;
      const obj=u.compIdx==null?w:w.components[u.compIdx];
      return obj?byId(obj[field])?.name:null;
    }).filter(Boolean))];
  }

  // ── ROWS 0–2: deduplicated grape & fermentation-line nodes ──
  grapeNodeInfo.forEach(({grapeId,nodeCx,cols})=>{
    const grape=grapeById(grapeId);
    const allocEntry=allocMap.get(grapeId);
    const totalLbs=grape?.pounds||0;
    const lbsLabel=allocEntry?.usedLbs>0?`${Math.round(allocEntry.usedLbs)} / ${Math.round(totalLbs)} lbs`:`${Math.round(totalLbs)} lbs`;
    const gColor=grape?.type==='white'?'#B8860B':'#8B0000';
    node(nodeCx,0,grape?.name||'Grape',lbsLabel,gColor);
    if(cols.length>1){
      const badgeY=nodeTop(0)-18;
      els.push(`<rect x="${nodeCx-46}" y="${badgeY-12}" width="92" height="14" rx="4" fill="#e8f4fd" stroke="#aed6f1" stroke-width="1"/>`);
      els.push(`<text x="${nodeCx}" y="${badgeY-1}" text-anchor="middle" font-size="9" fill="#1565c0" font-family="Georgia">${cols.length} ferment. lines</text>`);
      const colXs=cols.map(c=>c.cx);
      const minCx=Math.min(...colXs),maxCx=Math.max(...colXs);
      const busY=nodeBot(0)+18;
      els.push(`<line x1="${nodeCx}" y1="${nodeBot(0)}" x2="${nodeCx}" y2="${busY}" stroke="#999" stroke-width="2"/>`);
      els.push(`<line x1="${minCx}" y1="${busY}" x2="${maxCx}" y2="${busY}" stroke="#999" stroke-width="2"/>`);
      cols.forEach(col=>{
        els.push(`<line x1="${col.cx}" y1="${busY}" x2="${col.cx}" y2="${nodeTop(1)-5}" stroke="#999" stroke-width="2" marker-end="url(#arr)"/>`);
        const yeast=yeastById(col.line.yeastId);
        if(yeast) els.push(`<text x="${col.cx}" y="${busY-5}" text-anchor="middle" font-size="9" fill="#7A6358" font-family="Georgia">${yeast.name}</text>`);
      });
    } else if(cols.length===1){
      arrowV(nodeCx,nodeBot(0),nodeTop(1));
    }
    cols.forEach(col=>{
      const {line,cx,roseCx,hasRose}=col;
      line.cx=cx; line.roseCx=roseCx;
      const yeast=yeastById(line.yeastId);
      const primNames=eqNamesFor(line,'primaryEquipmentId');
      const primTitle=primNames.length===1?primNames[0]:primNames.length>1?primNames.length+' tanks':'Primary';
      node(cx,1,primTitle,(yeast?yeast.name+' · ':'')+fmtGal(line.totalMustGal),'#4A4A6A');
      arrowV(cx,nodeBot(1),nodeTop(2));
      const secNames=eqNamesFor(line,'secondaryEquipmentId');
      const secTitle=secNames.length===1?secNames[0]:secNames.length>1?secNames.length+' tanks':'Secondary';
      node(cx,2,secTitle,fmtGal(line.totalSecGal),'#3A5A7A');
      if(hasRose&&line.roseCalc){
        const saigY=nodeMid(1);
        els.push(`<text x="${(cx+roseCx)/2}" y="${saigY-10}" text-anchor="middle" font-size="10" fill="#8b3a4a" font-family="Georgia" font-style="italic">saignée bleed</text>`);
        hArrow(cx+NW/2,saigY,roseCx-NW/2,'#D4798A',true);
        drawRoseChain(roseCx,line.roseCalc,line.roseAgingEquipmentId);
      }
    });
  });

  // ── Allocation arrows: secondary (row 2) → project / SV-pool aging (row 3) ──
  fermLines.forEach(line=>{
    const srcCx=line.cx, srcY=nodeBot(2);
    let destIdx=0;
    const labelAt=(destCx,gal,color,suffix)=>{
      const midX=(srcCx+destCx)/2, midY=nodeMid(2)+ROW_H*0.20+destIdx*11;
      els.push(`<text x="${midX}" y="${midY}" text-anchor="middle" font-size="9" fill="${color}" font-family="Georgia" font-style="italic">${fmtGal(gal)} ${suffix}</text>`);
      destIdx++;
    };
    line.blendDests.forEach(d=>{
      const pl=projByWineId.get(d.wineId); if(!pl||d.gal<=0.05) return;
      const wColor=pl.wine.color==='red'?'#8B0000':'#C9A84C';
      arrowCurve(srcCx,srcY,pl.cx,nodeTop(3),wColor,true);
      labelAt(pl.cx,d.gal,wColor,'→ '+pl.wine.name);
      if(d.shortfall>0.05) els.push(`<text x="${srcCx}" y="${srcY+16}" text-anchor="middle" font-size="9" fill="#c0392b" font-family="Georgia">⚠ short ${fmtGal(d.shortfall)}</text>`);
    });
    line.wineDests.forEach(d=>{
      const pl=projByWineId.get(d.wineId); if(!pl||d.gal<=0.05) return;
      const wColor=pl.wine.color==='red'?'#8B0000':'#C9A84C';
      arrowCurve(srcCx,srcY,pl.cx,nodeTop(3),wColor,false);
      labelAt(pl.cx,d.gal,wColor,'→ '+pl.wine.name);
    });
    const pool=svPools.get(line.key);
    if(pool&&pool.totalExcessGal>0.05){
      const svl=svByKey.get(line.key);
      if(svl){
        arrowCurve(srcCx,srcY+4,svl.cx,nodeTop(3),'#7B6A5A',true);
        labelAt(svl.cx,pool.totalExcessGal,'#7B6A5A','→ SV');
      }
    }
  });

  // ── ROWS 3–4: wine project aging & bottles ──
  projLayouts.forEach(({wine,calc,cx})=>{
    const wColor=wine.color==='red'?'#8B0000':'#C9A84C';
    els.push(`<text x="${cx}" y="${PAD_TOP-78}" text-anchor="middle" font-size="14" font-weight="bold" fill="${wColor}" font-family="Georgia">${wine.name}</text>`);
    els.push(`<text x="${cx}" y="${PAD_TOP-60}" text-anchor="middle" font-size="11" fill="#7A6358" font-family="Georgia">${wine.wineType==='blend'?'Blend · '+wine.components.length+' varieties':'Single Varietal'}</text>`);
    const ageEq=byId(wine.agingEquipmentId),ageColor=wine.useOak?'#5D8A5E':'#2C7BB6';
    if(wine.wineType==='blend'){
      node(cx,3,ageEq?.name||'Blend Aging',calc?fmtGal(calc.agingGal)+(wine.useOak?' · '+wine.oakType:''):'—',ageColor);
      arrowV(cx,nodeBot(3),nodeTop(4),ageColor==='#5D8A5E'?'#5D8A5E':'#2C7BB6');
      node(cx,4,'🍾 '+wine.name,calc?`~${calc.blendBottles} btl`:'—','#2C3E50');
    } else {
      node(cx,3,ageEq?.name||'Aging Vessel',calc?fmtGal(calc.agingGal)+(wine.useOak?' · '+wine.oakType:''):'—',ageColor);
      arrowV(cx,nodeBot(3),nodeTop(4),ageColor==='#5D8A5E'?'#5D8A5E':'#2C7BB6');
      node(cx,4,'🍾 '+wine.name,calc?`~${calc.bottles} bottles`:'—','#2C3E50');
    }
  });

  // ── ROWS 3–4: auto-consolidated single-variety pools (excess from blends) ──
  if(svLayouts.length){
    const firstSvX=svLayouts[0].cx-SV_COL_W/2-12;
    els.push(`<line x1="${firstSvX}" y1="${rowY(2)-14}" x2="${firstSvX}" y2="${rowY(4)+NH+14}" stroke="#C9A88C" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6"/>`);
    els.push(`<text x="${firstSvX+5}" y="${rowY(2)-18}" font-size="11" fill="#7B6A5A" font-family="Georgia" font-style="italic" font-weight="bold">Single Variety Wines ▶</text>`);
  }
  svLayouts.forEach(({key,pool,cx})=>{
    const grape=grapeById(pool.grapeId),yeast=yeastById(pool.yeastId),ageEq=byId(pool.eqId);
    const grapeName=grape?.name||'SV';
    const yeastLabel=yeast?' · '+yeast.name:'';
    const srcNames=[...new Set(pool.sources.map(s=>wineById(s.wineId)?.name||'').filter(Boolean))];
    els.push(`<text x="${cx}" y="${PAD_TOP-48}" text-anchor="middle" font-size="13" font-weight="bold" fill="#7B6A5A" font-family="Georgia">${grapeName}</text>`);
    els.push(`<text x="${cx}" y="${PAD_TOP-30}" text-anchor="middle" font-size="10" fill="#999" font-family="Georgia">SV Wine${yeastLabel}</text>`);
    if(srcNames.length) els.push(`<text x="${cx}" y="${PAD_TOP-14}" text-anchor="middle" font-size="9" fill="#bbb" font-family="Georgia" font-style="italic">${srcNames.join(', ')}</text>`);
    node(cx,3,ageEq?.name||grapeName+' SV',fmtGal(pool.agingGal),'#7B6A5A');
    arrowV(cx,nodeBot(3),nodeTop(4),'#7B6A5A');
    node(cx,4,grapeName+' SV',`~${pool.bottles} btl`,'#5A4A3A');
  });

  return `<svg width="${totalW}" height="${totalH}" xmlns="http://www.w3.org/2000/svg">${els.join('\n')}</svg>`;
}

// ════════════════════════════════════════════
// EVENT HANDLERS
// ════════════════════════════════════════════
function setSVEquipment(key,eqId){
  if(!S.svEquipment)S.svEquipment={};
  S.svEquipment[key]=eqId||null;
  render();
}
function toggleOakField(){ const m=document.getElementById('eq-m'),f=document.getElementById('oak-field'); if(f) f.style.display=m.value==='oak'?'block':'none'; }
function toggleOakFieldEdit(){ const m=document.getElementById('eq-edit-m'),f=document.getElementById('oak-field-edit'); if(f) f.style.display=m.value==='oak'?'block':'none'; }
function setGrapeDefaults(){ const t=document.getElementById('g-t'),l=document.getElementById('g-lpg'); if(l) l.value=t.value==='white'?'12':'13'; }
function toggleEqUse(eqId,use,checked){
  const eq=byId(eqId); if(!eq) return;
  if(!eq.uses) eq.uses=[];
  if(checked&&!eq.uses.includes(use)) eq.uses.push(use);
  if(!checked) eq.uses=eq.uses.filter(u=>u!==use);
  render();
}
function saveEq(){
  const n=document.getElementById('eq-n')?.value.trim();
  const t=document.getElementById('eq-t')?.value;
  const m=document.getElementById('eq-m')?.value;
  const v=parseFloat(document.getElementById('eq-v')?.value);
  const q=parseInt(document.getElementById('eq-q')?.value)||1;
  const ot=document.getElementById('eq-ot')?.value;
  const uses=getUsesFromForm('eq');
  if(!n||!v) return alert('Name and volume required.');
  S.equipment.push({id:uid(),name:n,type:t,material:m,volumeGal:v,qty:q,oakType:m==='oak'?ot:null,uses});
  S.ui.showEqForm=false; render();
}
function saveEqEdit(id){
  const eq=byId(id); if(!eq) return;
  const n=document.getElementById('eq-edit-n')?.value.trim();
  const t=document.getElementById('eq-edit-t')?.value;
  const m=document.getElementById('eq-edit-m')?.value;
  const v=parseFloat(document.getElementById('eq-edit-v')?.value);
  const q=parseInt(document.getElementById('eq-edit-q')?.value)||1;
  const ot=document.getElementById('eq-edit-ot')?.value;
  const uses=getUsesFromForm('eq-edit');
  if(!n||!v) return alert('Name and volume required.');
  Object.assign(eq,{name:n,type:t,material:m,volumeGal:v,qty:q,oakType:m==='oak'?ot:null,uses});
  S.ui.editingEqId=null; render();
}
function delEq(id){ if(!confirm('Remove this equipment?')) return; S.equipment=S.equipment.filter(e=>e.id!==id); render(); }

function saveGrape(){
  const n=document.getElementById('g-n')?.value.trim(), t=document.getElementById('g-t')?.value;
  const p=parseFloat(document.getElementById('g-p')?.value), lpg=parseFloat(document.getElementById('g-lpg')?.value);
  const origin=document.getElementById('g-origin')?.value.trim(), brix=parseFloat(document.getElementById('g-brix')?.value)||null;
  const hsp=document.getElementById('g-hsp')?.value, hsm=document.getElementById('g-hsm')?.value;
  const hep=document.getElementById('g-hep')?.value, hem=document.getElementById('g-hem')?.value;
  if(!n||!p) return alert('Name and pounds required.');
  S.grapes.push({id:uid(),name:n,type:t,pounds:p,lbsPerGal:lpg||13,origin,targetBrix:brix,
    harvestStartPeriod:hsp,harvestStartMonth:hsm,harvestEndPeriod:hep,harvestEndMonth:hem});
  S.ui.showGrapeForm=false; render();
}
function saveGrapeEdit(id){
  const g=grapeById(id); if(!g) return;
  const n=document.getElementById('ge-n')?.value.trim(), t=document.getElementById('ge-t')?.value;
  const p=parseFloat(document.getElementById('ge-p')?.value), lpg=parseFloat(document.getElementById('ge-lpg')?.value);
  const origin=document.getElementById('ge-origin')?.value.trim(), brix=parseFloat(document.getElementById('ge-brix')?.value)||null;
  const hsp=document.getElementById('ge-hsp')?.value, hsm=document.getElementById('ge-hsm')?.value;
  const hep=document.getElementById('ge-hep')?.value, hem=document.getElementById('ge-hem')?.value;
  if(!n||!p) return alert('Name and pounds required.');
  Object.assign(g,{name:n,type:t,pounds:p,lbsPerGal:lpg||13,origin,targetBrix:brix,
    harvestStartPeriod:hsp,harvestStartMonth:hsm,harvestEndPeriod:hep,harvestEndMonth:hem});
  S.ui.editingGrapeId=null; render();
}
function delGrape(id){ if(!confirm('Remove this grape?')) return; S.grapes=S.grapes.filter(g=>g.id!==id); render(); }

function _getCustomYeastFromForm(prefix){
  const n=document.getElementById(`${prefix}-name`)?.value.trim();
  const brand=document.getElementById(`${prefix}-brand`)?.value.trim()||'Custom';
  const alc=parseFloat(document.getElementById(`${prefix}-alc`)?.value)||null;
  const temp=document.getElementById(`${prefix}-temp`)?.value.trim()||'';
  const desc=document.getElementById(`${prefix}-desc`)?.value.trim()||'';
  const tags=['red','white','rose'].filter(t=>document.getElementById(`${prefix}-tag-${t}`)?.checked);
  return {n,brand,alc,temp,desc,tags};
}
function saveCustomYeast(){
  const {n,brand,alc,temp,desc,tags}=_getCustomYeastFromForm('cy');
  if(!n) return alert('Yeast name is required.');
  if(!S.customYeasts) S.customYeasts=[];
  S.customYeasts.push({id:uid(),name:n,fullName:n,brand,alc,temp,desc,tags,recFor:[]});
  S.ui.showCustomYeastForm=false; render();
}
function saveCustomYeastEdit(id){
  const y=(S.customYeasts||[]).find(y=>y.id===id); if(!y) return;
  const {n,brand,alc,temp,desc,tags}=_getCustomYeastFromForm('cy-edit');
  if(!n) return alert('Yeast name is required.');
  Object.assign(y,{name:n,fullName:n,brand,alc,temp,desc,tags});
  S.ui.editingYeastId=null; render();
}
function delCustomYeast(id){
  if(!confirm('Remove this custom yeast?')) return;
  S.customYeasts=(S.customYeasts||[]).filter(y=>y.id!==id); render();
}

function newWine(){
  const id=uid();
  S.wines.push({id,name:'New Wine',color:'red',wineType:'single',lbsPerGal:13,
    components:[],grapeId:S.grapes[0]?.id||null,
    agingEquipmentId:null,agingVolumeGal:6,useOak:false,oakType:null,
    secondaryEquipmentId:null,primaryEquipmentId:null,
    hasRose:false,saigneePercent:10,roseAgingEquipmentId:null,roseAgingVolumeGal:0,
    roseYeastId:null,yeastId:null,useTankSplit:false,
    tanks:[{id:uid(),name:'Tank A',percent:100,yeastId:null,blendPct:100}]});
  S.ui.wineId=id; render();
}
function delWine(id){ if(!confirm('Delete this wine project?')) return; S.wines=S.wines.filter(w=>w.id!==id); S.ui.wineId=S.wines[0]?.id||null; render(); }
function updateWine(id,key,val){
  const w=wineById(id); if(!w) return; w[key]=val;
  if(key==='color'&&val!=='red'){ w.hasRose=false; w.components.forEach(c=>c.hasRose=false); }
  if(key==='useTankSplit'&&val&&(!w.tanks||w.tanks.length===0))
    w.tanks=[{id:uid(),name:'Tank A',percent:100,yeastId:w.yeastId,blendPct:100}];
  render();
}
function pickAgingEq(wid,eqId){
  const w=wineById(wid); if(!w) return; w.agingEquipmentId=eqId;
  const eq=byId(eqId);
  if(eq){w.agingVolumeGal=eq.volumeGal; if(eq.material==='oak'){w.useOak=true;w.oakType=eq.oakType||'french';}}
  render();
}
function pickRoseEq(wid,compIdx,eqId){
  const w=wineById(wid); if(!w) return; const eq=byId(eqId);
  if(compIdx!==null&&compIdx!==undefined&&w.components[compIdx]){
    w.components[compIdx].roseAgingEquipmentId=eqId; w.components[compIdx].roseAgingVolumeGal=eq?.volumeGal||0;
  } else { w.roseAgingEquipmentId=eqId; w.roseAgingVolumeGal=eq?.volumeGal||0; }
  render();
}
function addComp(wid){
  const w=wineById(wid); if(!w) return;
  const gid=S.grapes.find(g=>g.type===w.color)?.id||S.grapes[0]?.id||null;
  w.components.push({grapeId:gid,ratio:0,primaryEquipmentId:null,secondaryEquipmentId:null,
    hasRose:false,saigneePercent:10,roseAgingEquipmentId:null,roseAgingVolumeGal:0,
    roseYeastId:null,singleAgingEquipmentId:null,
    yeastId:null,useTankSplit:false,tanks:[{id:uid(),name:'Tank A',percent:100,yeastId:null,blendPct:100}]});
  render();
}
function removeComp(wid,idx){ const w=wineById(wid); if(!w) return; w.components.splice(idx,1); render(); }
function updateComp(wid,idx,key,val){
  const w=wineById(wid); if(!w||!w.components[idx]) return; w.components[idx][key]=val;
  if(key==='useTankSplit'&&val&&(!w.components[idx].tanks||w.components[idx].tanks.length===0))
    w.components[idx].tanks=[{id:uid(),name:'Tank A',percent:100,yeastId:w.components[idx].yeastId,blendPct:100}];
  render();
}
function addTank(wid,ciRaw){
  const w=wineById(wid); if(!w) return;
  const ci=ciRaw==='null'||ciRaw===null||ciRaw===undefined?null:parseInt(ciRaw);
  const arr=ci!==null?w.components[ci].tanks:w.tanks;
  if(!arr) return;
  arr.push({id:uid(),name:'Tank '+String.fromCharCode(65+arr.length),percent:0,yeastId:null,blendPct:100});
  render();
}
function removeTank(wid,ciRaw,ti){
  const w=wineById(wid); if(!w) return;
  const ci=ciRaw==='null'||ciRaw===null||ciRaw===undefined?null:parseInt(ciRaw);
  const arr=ci!==null?w.components[ci].tanks:w.tanks;
  if(arr) arr.splice(ti,1); render();
}
function updateTank(wid,ciRaw,ti,key,val){
  const w=wineById(wid); if(!w) return;
  const ci=ciRaw==='null'||ciRaw===null||ciRaw===undefined?null:parseInt(ciRaw);
  const arr=ci!==null?w.components[ci].tanks:w.tanks;
  if(arr&&arr[ti]) arr[ti][key]=val; render();
}

document.addEventListener('DOMContentLoaded',()=>initStorage());
</script>
